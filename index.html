<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新增排程</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f3f4f6;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 10px;
}

#list div {
  background: #fff;
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="card">
  <h2>📅 新增排程</h2>

  <form id="form">
    <input type="date" id="date" required>
    <textarea id="task" placeholder="輸入事項..." required></textarea>

    <select id="type">
      <option value="普通">普通</option>
      <option value="急件">急件</option>
    </select>

    <button type="submit">儲存</button>
  </form>

  <p id="msg"></p>

  <h3>📋 紀錄列表</h3>
  <div id="list"></div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbzf8QSFaztIH3uJeJl0ZPetDRdx-RmMG9T7rw_IbPRgTGUwzpcDnaRI9NZL5zFQSlVMiA/exec";

// 送資料
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const date = document.getElementById("date").value;
  const task = document.getElementById("task").value;
  const type = document.getElementById("type").value;

  let insertTop = false;

  if (type === "急件") {
    insertTop = confirm("是否插到最上面？");
  }

  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ date, task, type, insertTop })
  });

  const data = await res.json();

  document.getElementById("msg").innerText =
    data.status === "success" ? "✅ 成功" : "❌ 錯誤";

  loadData();
});


// 讀資料
async function loadData() {
  const res = await fetch(url);
  const data = await res.json();

  // 急件優先
  data.sort((a, b) => {
    if (a.type === "急件" && b.type !== "急件") return -1;
    if (a.type !== "急件" && b.type === "急件") return 1;
    return 0;
  });

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    list.innerHTML += `
      <div>
        <b>${item.date}</b> - ${item.task}<br>
        <small>${item.type}</small>
      </div>
    `;
  });
}

loadData();
</script>

</body>
</html>
